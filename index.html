<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terminal Conversation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <canvas id="c"></canvas>

  <div id="start-screen">
    <span class="start-text">&gt;_ click to begin</span><span class="cursor"></span>
  </div>

  <div id="terminal">
    <div id="terminal-output"></div>
    <div id="terminal-input-row">
      <span class="prompt">&gt;&nbsp;</span>
      <input id="terminal-input" type="text" autocomplete="off" spellcheck="false" />
    </div>
    <div id="terminal-choices"></div>
    <span class="cursor" id="terminal-cursor"></span>
  </div>

  <div id="hint"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
